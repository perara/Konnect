name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo check --workspace
      - name: Test
        run: cargo test --workspace --lib

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  packaging:
    name: PCM packaging validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install jsonschema
      - name: Validate repository metadata
        run: python packaging/validate-pcm.py --metadata packaging/metadata.json
      - name: Assemble PCM zip with a stub binary and validate structure
        shell: pwsh
        run: |
          New-Item -ItemType File -Path stub-konnect.exe | Out-Null
          Set-Content stub-konnect.exe "stub"
          New-Item -ItemType File -Path stub-viewer.exe | Out-Null
          Set-Content stub-viewer.exe "stub"
          ./packaging/build-pcm.ps1 -Version 0.0.0 -BinaryPath stub-konnect.exe `
            -ViewerPath stub-viewer.exe -OutDir dist
          python packaging/validate-pcm.py `
            --zip dist/konnect-pcm-windows-v0.0.0.zip --platform windows
      - name: Assemble and validate Linux PCM structure
        run: |
          printf stub > stub-konnect
          printf stub > stub-viewer
          chmod +x stub-konnect stub-viewer
          ./packaging/build-pcm.sh --version 0.0.0 --binary stub-konnect \
            --viewer stub-viewer --out dist
          python packaging/validate-pcm.py \
            --zip dist/konnect-pcm-linux-v0.0.0.zip --platform linux
