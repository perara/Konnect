name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: konnect

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p konnect

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ env.BINARY_NAME }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path "${{ env.BINARY_NAME }}.exe" -DestinationPath "../../../${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.*

  linux-build:
    name: Build portable Linux release and PCM
    runs-on: ubuntu-latest
    container: debian:12
    steps:
      - uses: actions/checkout@v4

      - name: Install build and Tauri dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential ca-certificates cmake curl file git libgtk-3-dev \
            libprotobuf-dev librsvg2-dev libwebkit2gtk-4.1-dev pkg-config protobuf-compiler \
            python3 python3-jsonschema zip

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-debian12-release

      - name: Build Linux server and viewer
        run: |
          cargo build --locked --release -p konnect
          cargo build --locked --release --manifest-path crates/schematic-viewer/Cargo.toml

      - name: Enforce Linux compatibility baseline
        run: packaging/check-linux-compat.sh target/release/konnect crates/schematic-viewer/target/release/schematic-viewer 2.36

      - name: Package standalone Linux archive
        run: |
          mkdir -p linux-archive
          install -m755 target/release/konnect linux-archive/konnect
          install -m755 crates/schematic-viewer/target/release/schematic-viewer linux-archive/schematic-viewer
          tar -C linux-archive -czf "konnect-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz" konnect schematic-viewer

      - name: Assemble and validate Linux PCM package
        run: |
          version="${GITHUB_REF_NAME#v}"
          packaging/build-pcm.sh --version "$version" \
            --binary target/release/konnect \
            --viewer crates/schematic-viewer/target/release/schematic-viewer \
            --out dist
          python3 packaging/validate-pcm.py \
            --zip "dist/konnect-pcm-linux-v$version.zip" --platform linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: konnect-linux
          path: |
            konnect-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
            dist/konnect-pcm-linux-*.zip

  pcm-package:
    name: KiCAD PCM plugin package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: pcm-package

      - name: Build server binary
        run: cargo build --release -p konnect

      - name: Build schematic viewer
        run: cargo build --release --manifest-path crates/schematic-viewer/Cargo.toml

      - name: Assemble PCM package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          ./packaging/build-pcm.ps1 -Version $version `
            -BinaryPath target/release/konnect.exe `
            -ViewerPath crates/schematic-viewer/target/release/schematic-viewer.exe `
            -OutDir dist

      - name: Validate PCM package against KiCAD schema (release gate)
        shell: pwsh
        run: |
          pip install jsonschema
          $version = "${{ github.ref_name }}".TrimStart('v')
          python packaging/validate-pcm.py `
            --zip "dist/konnect-pcm-windows-v$version.zip" --platform windows

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: konnect-pcm
          path: dist/konnect-pcm-*.zip

  release:
    name: Create Release
    needs: [build, linux-build, pcm-package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
